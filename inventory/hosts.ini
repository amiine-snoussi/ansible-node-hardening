###############################################################################
# Inventory — Define your target servers here
#
# For local testing with Vagrant:
#   Replace IPs with your Vagrant box IP
#
# For AWS (pairs with terraform-infra-demo):
#   Use the public IP from `terraform output public_ip`
###############################################################################

[webservers]
# web01 ansible_host=192.168.56.10
# web02 ansible_host=192.168.56.11

[dbservers]
# db01 ansible_host=192.168.56.20

[monitoring]
# monitor01 ansible_host=192.168.56.30

# ---------------------------------------------------------------------------
# Example: Use with terraform-infra-demo output
# ---------------------------------------------------------------------------
# [aws]
# fleetlane ansible_host=<TERRAFORM_OUTPUT_PUBLIC_IP>
#
# [aws:vars]
# ansible_user=ubuntu
# ansible_ssh_private_key_file=~/.ssh/fleetlane
