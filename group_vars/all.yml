###############################################################################
# group_vars/all.yml — Default configuration for all hosts
# Override per-group or per-host as needed.
###############################################################################
---

# --- General ---
common_timezone: America/Montreal
common_deploy_user: deploy
common_deploy_user_shell: /bin/bash

# --- SSH Hardening ---
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_max_auth_tries: 3
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2
ssh_allowed_users:
  - "{{ common_deploy_user }}"
  - ubuntu

# --- Firewall (UFW) ---
firewall_default_incoming: deny
firewall_default_outgoing: allow
firewall_rules:
  - { rule: allow, port: "{{ ssh_port }}", proto: tcp, comment: "SSH" }
  - { rule: allow, port: 80, proto: tcp, comment: "HTTP" }
  - { rule: allow, port: 443, proto: tcp, comment: "HTTPS" }

# --- Docker ---
docker_install: true
docker_users:
  - "{{ common_deploy_user }}"
  - ubuntu

# --- Monitoring ---
monitoring_install_node_exporter: true
monitoring_node_exporter_version: "1.7.0"
monitoring_node_exporter_port: 9100
